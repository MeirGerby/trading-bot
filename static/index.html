<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; font-size: 14px; padding: 20px; }
  h1 { font-size: 20px; margin-bottom: 4px; color: #f8fafc; }
  .subtitle { color: #64748b; font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: #1e2130; border: 1px solid #2d3148; border-radius: 8px; padding: 16px; }
  .card.full { grid-column: 1 / -1; }
  h2 { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: right; color: #64748b; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid #2d3148; }
  td { padding: 7px 8px; border-bottom: 1px solid #1a1e2e; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .b-breakout { background: #1e3a5f; color: #60a5fa; }
  .b-momentum { background: #1a3a2a; color: #4ade80; }
  .b-options  { background: #3a2a1a; color: #fb923c; }
  .score { font-weight: 700; color: #f8fafc; }
  .price { color: #a3e635; font-family: monospace; }
  .time { color: #475569; font-size: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1e2e; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #94a3b8; }
  .stat-val { font-weight: 600; }
  .delta { font-size: 11px; margin-right: 6px; }
  .up { color: #4ade80; }
  .down { color: #f87171; }
  .neutral { color: #64748b; }
  #refresh-time { color: #334155; font-size: 11px; margin-top: 20px; text-align: center; }
  .empty { color: #475569; font-size: 13px; text-align: center; padding: 20px 0; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn { background: #1e2130; border: 1px solid #2d3148; border-radius: 8px; color: #64748b;
    padding: 8px 20px; font-size: 14px; cursor: pointer; transition: all .15s; }
  .tab-btn.active { background: #2d3148; color: #f8fafc; border-color: #4a5180; }
  .tab-btn:hover:not(.active) { color: #94a3b8; }

  /* Trading view */
  #view-trading { display: none; }
  .status-bar { display: flex; align-items: center; gap: 16px; background: #1e2130;
    border: 1px solid #2d3148; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .status-bar span { font-size: 12px; color: #64748b; }
  .status-bar strong { color: #94a3b8; }
  .scan-btn { background: #1e3a5f; color: #60a5fa; border: 1px solid #2a4a7f;
    border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; margin-right: auto; }
  .scan-btn:hover { background: #2a4a7f; }
  .scan-btn:disabled { opacity: .45; cursor: not-allowed; }
  .spinning { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .signal-card { background: #1e2130; border: 1px solid #2d3148; border-radius: 8px; padding: 14px; }
  .signal-card.score-3 { border-color: #4ade80; }
  .signal-card.score-2 { border-color: #fb923c; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-ticker { font-size: 18px; font-weight: 700; color: #f8fafc; }
  .card-score { font-size: 13px; color: #64748b; }
  .card-price { font-size: 15px; font-family: monospace; color: #a3e635; margin: 6px 0; }
  .card-details { font-size: 11px; color: #64748b; margin-top: 6px; line-height: 1.7; }

  /* Chart controls */
  .chart-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .chart-controls select {
    background: #0f1117; color: #e2e8f0; border: 1px solid #2d3148;
    border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer;
  }
  .period-btn {
    background: #0f1117; color: #64748b; border: 1px solid #2d3148;
    border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .period-btn.active { background: #2d3148; color: #e2e8f0; border-color: #4a5180; }
  .period-btn:hover:not(.active) { border-color: #4a5180; color: #94a3b8; }
  #chart-info { font-size: 12px; color: #64748b; margin-right: auto; }
  #chart-container { direction: ltr; width: 100%; height: 360px; border-radius: 6px; overflow: hidden; }
  #chart-loading { color: #475569; font-size: 13px; text-align: center; padding: 60px 0; display: none; }
</style>
</head>
<body>

<h1>📊 Trading Bot Dashboard</h1>
<p class="subtitle" id="last-updated">טוען...</p>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')">📊 דשבורד</button>
  <button class="tab-btn" onclick="switchTab('trading')">⚡ מסחר יומי</button>
</div>

<!-- Daily trading view -->
<div id="view-trading">
  <div class="status-bar">
    <span><strong>סרוק אחרון:</strong> <span id="last-scan-time">—</span></span>
    <span><strong>סריקה הבאה:</strong> <span id="next-scan-countdown">—</span></span>
    <span id="scan-running-indicator" style="display:none"><span class="spinning">⟳</span> סריקה בתהליך...</span>
    <button class="scan-btn" id="scan-now-btn" onclick="triggerScan()">🔄 סרוק עכשיו</button>
  </div>
  <div id="signals-container" class="signals-grid">
    <p class="empty">ממתין לסריקה הראשונה...</p>
  </div>
</div>

<div id="view-dashboard" class="grid">

  <!-- Chart -->
  <div class="card full">
    <h2>גרף שוק ההון</h2>
    <div class="chart-controls">
      <select id="ticker-select">
        <option>AAPL</option><option>MSFT</option><option>NVDA</option>
        <option>TSLA</option><option>AMZN</option><option>META</option>
        <option>GOOGL</option><option>AMD</option><option>SMCI</option>
        <option>PLTR</option><option>MSTR</option><option>COIN</option>
        <option>HOOD</option><option>RIVN</option><option>LCID</option>
        <option>SPY</option><option>QQQ</option><option>IWM</option>
      </select>
      <button class="period-btn active" data-period="1d">יומי</button>
      <button class="period-btn" data-period="5d">שבועי</button>
      <button class="period-btn" data-period="1mo">חודשי</button>
      <span id="chart-info"></span>
    </div>
    <div id="chart-loading">טוען נתונים...</div>
    <div id="chart-container"></div>
  </div>

  <!-- Alerts -->
  <div class="card full">
    <h2>התראות אחרונות</h2>
    <div id="alerts-container"><p class="empty">טוען...</p></div>
  </div>

  <!-- Weights -->
  <div class="card">
    <h2>משקלות נוכחיות</h2>
    <div id="weights-container"><p class="empty">טוען...</p></div>
  </div>

  <!-- Feedback -->
  <div class="card">
    <h2>פידבק</h2>
    <div id="feedback-container"><p class="empty">טוען...</p></div>
  </div>
</div>

</div><!-- /view-dashboard -->

<div id="refresh-time"></div>

<script>
// ─── Chart ────────────────────────────────────────────────────────────────────
let chart = null;
let candleSeries = null;
let currentTicker = 'AAPL';
let currentPeriod = '1d';

function initChart() {
  const container = document.getElementById('chart-container');
  const w = container.offsetWidth || window.innerWidth - 80;
  chart = LightweightCharts.createChart(container, {
    width: w,
    height: 360,
    layout: { background: { color: '#1e2130' }, textColor: '#94a3b8' },
    grid: { vertLines: { color: '#252840' }, horzLines: { color: '#252840' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#2d3148' },
    rightPriceScale: { borderColor: '#2d3148' },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#4ade80', downColor: '#f87171',
    borderUpColor: '#4ade80', borderDownColor: '#f87171',
    wickUpColor: '#4ade80', wickDownColor: '#f87171',
  });
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.offsetWidth });
  });
}

async function loadChart() {
  const loading = document.getElementById('chart-loading');
  document.getElementById('chart-info').textContent = 'טוען...';

  try {
    const res = await fetch(`/api/chart/${currentTicker}?period=${currentPeriod}`);
    const data = await res.json();

    if (!data.candles || !data.candles.length) {
      document.getElementById('chart-info').textContent = 'אין נתונים (שוק סגור?)';
      candleSeries.setData([]);
      return;
    }

    candleSeries.setData(data.candles);
    chart.timeScale().fitContent();

    const last = data.candles[data.candles.length - 1];
    const first = data.candles[0];
    const change = ((last.close - first.open) / first.open * 100).toFixed(2);
    const cls = change >= 0 ? 'up' : 'down';
    const sign = change >= 0 ? '+' : '';
    document.getElementById('chart-info').innerHTML =
      `<strong>${currentTicker}</strong> &nbsp;$${last.close.toFixed(2)} &nbsp;<span class="${cls}">${sign}${change}%</span>`;
  } catch (e) {
    document.getElementById('chart-info').textContent = 'שגיאה בטעינת הנתונים';
  }
}

document.getElementById('ticker-select').addEventListener('change', e => {
  currentTicker = e.target.value;
  loadChart();
});

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    loadChart();
  });
});

// ─── Tab switching ────────────────────────────────────────────────────────────
let tradingPollTimer = null;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && name === 'dashboard') || (i === 1 && name === 'trading'));
  });
  document.getElementById('view-dashboard').style.display = name === 'dashboard' ? 'grid' : 'none';
  document.getElementById('view-trading').style.display  = name === 'trading'   ? 'block' : 'none';

  if (name === 'trading') {
    loadRecommendations();
    if (!tradingPollTimer) tradingPollTimer = setInterval(loadRecommendations, 5000);
  } else {
    clearInterval(tradingPollTimer);
    tradingPollTimer = null;
  }
}

// ─── Recommendations (daily trading) ─────────────────────────────────────────
const SCORE_STARS = ['', '⭐', '⭐⭐', '⭐⭐⭐'];

function fmtRelTime(ts) {
  if (!ts) return '—';
  const diff = Math.floor((Date.now() / 1000) - ts);
  if (diff < 60) return `לפני ${diff} שניות`;
  if (diff < 3600) return `לפני ${Math.floor(diff / 60)} דקות`;
  return `לפני ${Math.floor(diff / 3600)} שעות`;
}

function fmtCountdown(ts) {
  if (!ts) return '—';
  const diff = Math.max(0, Math.floor(ts - Date.now() / 1000));
  const m = Math.floor(diff / 60), s = diff % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

async function loadRecommendations() {
  try {
    const res = await fetch('/api/recommendations');
    const data = await res.json();

    document.getElementById('last-scan-time').textContent = fmtRelTime(data.last_scan);
    document.getElementById('next-scan-countdown').textContent = data.running ? '—' : fmtCountdown(data.next_scan);
    document.getElementById('scan-running-indicator').style.display = data.running ? 'inline' : 'none';
    document.getElementById('scan-now-btn').disabled = data.running;

    const container = document.getElementById('signals-container');
    if (data.running && !data.signals.length) {
      container.innerHTML = '<p class="empty"><span class="spinning" style="font-size:20px">⟳</span><br>סריקה בתהליך — זה יכול לקחת מספר דקות...</p>';
      return;
    }
    if (!data.signals.length) {
      container.innerHTML = '<p class="empty">לא נמצאו הזדמנויות בסריקה האחרונה</p>';
      return;
    }

    container.innerHTML = data.signals.map(s => {
      const badges = (s.signal_types || []).map(badge).join(' ');
      const detailLines = Object.entries(s.details || {})
        .map(([k, v]) => `<span style="color:#94a3b8">${k}:</span> ${v}`)
        .join('<br>');
      const confLine = s.confidence !== undefined
        ? `<div style="font-size:12px;color:#94a3b8">ביטחון: <strong>${Math.round(s.confidence * 100)}%</strong>${s.approved === false ? ' <span class="down">⚠️ נדחה בבדיקות סיכון</span>' : ''}</div>`
        : '';
      return `<div class="signal-card score-${s.score}">
        <div class="card-header">
          <span class="card-ticker">${s.ticker}</span>
          <span class="card-score">${SCORE_STARS[s.score] || s.score}</span>
        </div>
        <div>${badges}</div>
        <div class="card-price">$${Number(s.price).toFixed(2)}</div>
        ${confLine}
        <div class="card-details">${detailLines}</div>
      </div>`;
    }).join('');
  } catch (e) { /* silent */ }
}

async function triggerScan() {
  const btn = document.getElementById('scan-now-btn');
  btn.disabled = true;
  await fetch('/api/scan', { method: 'POST' });
  loadRecommendations();
}

// ─── Existing sections ────────────────────────────────────────────────────────
const SIGNAL_LABELS = { breakout: 'פריצה', momentum: 'מומנטום', options: 'אופציות' };

function badge(sig) {
  return `<span class="badge b-${sig}">${SIGNAL_LABELS[sig] || sig}</span>`;
}

function fmt(ts) {
  const d = new Date(ts + 'Z');
  return d.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

async function loadAlerts() {
  const res = await fetch('/api/alerts');
  const { alerts } = await res.json();
  const el = document.getElementById('alerts-container');
  if (!alerts.length) { el.innerHTML = '<p class="empty">אין התראות עדיין</p>'; return; }

  let html = '<table><thead><tr><th>Ticker</th><th>ניקוד</th><th>סיגנלים</th><th>מחיר</th><th>פרטים</th><th>זמן</th></tr></thead><tbody>';
  for (const a of alerts) {
    const badges = (a.signal_types || []).map(badge).join(' ');
    const details = Object.entries(a.details || {}).map(([k,v]) => `<span style="color:#64748b">${k}:</span> ${v}`).join(' &nbsp;|&nbsp; ');
    html += `<tr>
      <td><strong>${a.ticker}</strong></td>
      <td class="score">${a.score}</td>
      <td>${badges}</td>
      <td class="price">$${Number(a.price).toFixed(2)}</td>
      <td style="font-size:12px;color:#94a3b8">${details}</td>
      <td class="time">${fmt(a.timestamp)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function loadWeights() {
  const res = await fetch('/api/weights');
  const { weights } = await res.json();
  const el = document.getElementById('weights-container');
  const LABELS = {
    breakout_volume_ratio: 'נפח × ממוצע (פריצה)',
    breakout_pct_from_high: '% מ-52w High',
    momentum_rsi_min: 'RSI מינימום',
    momentum_price_above_ma: 'תקופת MA',
    options_vol_oi_ratio: 'Vol/OI אופציות',
    options_iv_percentile_min: 'IV מינימום',
    min_score_to_alert: 'ניקוד מינימום להתראה',
  };
  let html = '';
  for (const [k, v] of Object.entries(weights)) {
    const cur = Number(v.current), def = Number(v.default), diff = cur - def;
    let deltaHtml = '';
    if (Math.abs(diff) > 0.0001) {
      const cls = diff > 0 ? 'up' : 'down';
      deltaHtml = `<span class="delta ${cls}">(${diff > 0 ? '+' : ''}${diff.toFixed(2)})</span>`;
    }
    html += `<div class="stat-row"><span class="stat-label">${LABELS[k] || k}</span><span class="stat-val">${deltaHtml}${cur}</span></div>`;
  }
  el.innerHTML = html || '<p class="empty">אין נתונים</p>';
}

async function loadFeedback() {
  const res = await fetch('/api/feedback');
  const data = await res.json();
  const el = document.getElementById('feedback-container');
  const pct = data.total ? Math.round(data.positive / data.total * 100) : 0;
  let html = `<div class="stat-row"><span class="stat-label">סה"כ פידבק</span><span class="stat-val">${data.total}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">חיובי / שלילי</span><span class="stat-val"><span class="up">${data.positive}</span> / <span class="down">${data.negative}</span> <span class="neutral">(${pct}%)</span></span></div>`;
  if (Object.keys(data.by_signal || {}).length) {
    html += `<div style="margin:10px 0 4px;color:#475569;font-size:12px">לפי סוג סיגנל</div>`;
    for (const [sig, counts] of Object.entries(data.by_signal)) {
      const t = counts.positive + counts.negative;
      html += `<div class="stat-row">${badge(sig)}<span class="stat-val neutral">${t ? Math.round(counts.positive/t*100) : 0}% חיובי (${t})</span></div>`;
    }
  }
  if (data.top_tickers && data.top_tickers.length) {
    html += `<div style="margin:10px 0 4px;color:#475569;font-size:12px">Top tickers</div>`;
    for (const t of data.top_tickers) {
      const tot = t.positive + t.negative;
      html += `<div class="stat-row"><span class="stat-label">${t.ticker}</span><span class="stat-val neutral">${tot ? Math.round(t.positive/tot*100) : 0}% (${tot})</span></div>`;
    }
  }
  el.innerHTML = html || '<p class="empty">אין פידבק עדיין</p>';
}

async function refresh() {
  await Promise.all([loadAlerts(), loadWeights(), loadFeedback()]);
  const now = new Date().toLocaleTimeString('he-IL');
  document.getElementById('last-updated').textContent = `עודכן: ${now}`;
  document.getElementById('refresh-time').textContent = `רענון אוטומטי כל 30 שניות`;
}

// Initial load — init chart immediately so container has correct dimensions
initChart();
loadChart();
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
