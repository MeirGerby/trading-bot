services:
  bot:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    restart: always
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
